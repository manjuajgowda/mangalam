<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <section class="faq-section">
      <div class="faq-container">
        <h2>
          <span>Frequently</span>
          Asked Questions
        </h2>

        <div class="faq-wrapper">
          <div class="faq-item active">
            <button class="faq-question">
              What is the purpose of a laser cutter for sheet metal?

              <i class="fa-solid fa-angle-up"></i>
            </button>

            <div class="faq-answer">
              <p>
                It is designed to cut various types of sheet metal with
                precision, allowing for intricate designs and shapes that are
                essential in manufacturing.
              </p>
            </div>
          </div>

          <div class="faq-item">
            <button class="faq-question">
              What are the benefits of using aluminum tubing in manufacturing?

              <i class="fa-solid fa-angle-down"></i>
            </button>
          </div>

          <div class="faq-item">
            <button class="faq-question">
              How is aluminum tubing produced?

              <i class="fa-solid fa-angle-down"></i>
            </button>
          </div>

          <div class="faq-item">
            <button class="faq-question">
              What are the common applications of aluminum tubing?

              <i class="fa-solid fa-angle-down"></i>
            </button>
          </div>

          <div class="faq-item">
            <button class="faq-question">
              Can aluminum tubing be customized?

              <i class="fa-solid fa-angle-down"></i>
            </button>
          </div>
        </div>

        <div class="catalogue-box">
          <div class="catalogue-content">
            <h3>Want us to email the entire catalogue?</h3>

            <p>
              Enter your email and an expert will share the catalogue with you.
            </p>
          </div>

          <div class="catalogue-form">
            <input type="email" placeholder="Email Address" />

            <button>Request Catalogue</button>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
